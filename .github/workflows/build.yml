name: BioPro Production Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    # --- THE FIX: OS-SPECIFIC INSTALLS ---
    - name: Install Dependencies (Windows - CPU Only)
      if: runner.os == 'Windows'
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    # -------------------------------------

    - name: Run PyInstaller Build
      run: pyinstaller BioPro.spec --clean

    - name: Compress macOS App Bundle
      if: runner.os == 'macOS'
      run: |
        cd dist
        tar -czf BioPro-macOS.tar.gz BioPro.app
        rm -rf BioPro.app  
        rm -rf BioPro      
        
    - name: Upload Finished App to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: BioPro-Executable-${{ runner.os }}
        path: |
          dist/*.tar.gz
          dist/*.exe
          dist/BioPro
        if-no-files-found: warn