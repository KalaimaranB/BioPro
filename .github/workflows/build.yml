name: BioPro Production Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
    paths:
      - 'biopro/**'
      - 'requirements.txt'
      - 'BioPro.spec'
      - 'pyproject.toml'
      - 'icon.icns'
      - 'authorities.json'
  workflow_dispatch:

jobs:
  check-version:
    name: Check if version was updated
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version-check.outputs.changed }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Version Check
        id: version-check
        run: |
          NEW_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)
          echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          if [ $(git rev-list --count HEAD) -eq 1 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git checkout HEAD^ -- pyproject.toml
            OLD_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)
            git checkout HEAD -- pyproject.toml
            if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    name: Build on ${{ matrix.os }}
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, windows-latest]
    env:
      SOURCE_DATE_EPOCH: 0
      PYTHONHASHSEED: 0

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set SOURCE_DATE_EPOCH
      shell: bash
      run: |
        EPOCH=$(git log -1 --format=%ct)
        echo "SOURCE_DATE_EPOCH=$EPOCH" >> $GITHUB_ENV

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip wheel
        pip install --require-hashes -r requirements.txt
        pip install pyinstaller pytest

    - name: Run Supply Chain Integrity Check
      run: pytest tests/core/test_supply_chain.py

    - name: Run PyInstaller Build
      run: pyinstaller BioPro.spec

    - name: Compress Artifacts (Windows)
      if: runner.os == 'Windows'
      run: |
        cd dist
        Compress-Archive -Path BioPro\* -DestinationPath BioPro-Windows.zip

    - name: Compress Artifacts (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        tar -czf BioPro-macOS.tar.gz BioPro.app

    - name: Generate SBOM
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -c "from biopro.core.sbom import SBOMGenerator; print(SBOMGenerator().to_json())" > dist/sbom.json

    - name: Generate Checksum
      shell: bash
      run: |
        cd dist
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum sbom.json > sbom.json.sha256
        else
          shasum -a 256 sbom.json > sbom.json.sha256
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BioPro-Executable-${{ runner.os }}
        path: |
          dist/*.tar.gz
          dist/*.zip
          dist/sbom.json
          dist/sbom.json.sha256

  collect-hashes:
    name: Collect Artifact Hashes
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Multi-Platform Hashes
        id: hashes
        run: |
          cd artifacts
          echo "hashes=$(sha256sum * | base64 -w0)" >> $GITHUB_OUTPUT

  provenance:
    needs: [collect-hashes]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.collect-hashes.outputs.hashes }}"
      upload-assets: true

  release:
    name: Create GitHub Release
    needs: [check-version, build, provenance]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: BioPro ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            release_artifacts/*.zip
            release_artifacts/*.tar.gz
            release_artifacts/sbom.json
            release_artifacts/sbom.json.sha256
            release_artifacts/*.intoto.jsonl
