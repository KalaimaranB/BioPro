name: BioPro Production Build

# This tells GitHub to run this pipeline whenever you push to main, 
# or manually via a button on the website (workflow_dispatch).
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # This is the "Matrix". It spins up 3 different virtual machines!
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Locking the build environment

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    # One command handles every OS.
    - name: Run PyInstaller Build
      run: pyinstaller BioPro.spec --clean

    - name: Compress macOS App Bundle
      if: runner.os == 'macOS'
      run: |
        cd dist
        tar -czf BioPro-macOS.tar.gz BioPro.app
        rm -rf BioPro.app  # Delete the raw app so GitHub doesn't upload it!
        rm -f BioPro       # Delete the raw unix executable artifact

    - name: Upload Finished App to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: BioPro-Executable-${{ runner.os }}
        path: |
          dist/BioPro-macOS.tar.gz
          dist/BioPro.exe