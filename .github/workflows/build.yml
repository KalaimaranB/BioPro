name: BioPro Production Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'biopro/**'
      - 'requirements.txt'
      - 'BioPro.spec'
      - 'pyproject.toml'
      - 'icon.icns'
      - 'authorities.json'
  workflow_dispatch:

jobs:
  check-version:
    name: Check if version was updated
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version-check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Version Check
        id: version-check
        run: |
          # Get the current version
          NEW_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)
          echo "Current Version: $NEW_VERSION"
          
          # Check if this is the first commit in the repo
          if [ $(git rev-list --count HEAD) -eq 1 ]; then
            echo "First commit detected. Forcing build."
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # Get the version from the previous commit
            git checkout HEAD^ -- pyproject.toml
            OLD_VERSION=$(grep -m 1 'version =' pyproject.toml | cut -d '"' -f 2)
            echo "Previous Version: $OLD_VERSION"
            
            # Reset the file
            git checkout HEAD -- pyproject.toml
            
            if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
              echo "Version changed. Triggering build."
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "Version unchanged. Skipping build."
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    name: Build on ${{ matrix.os }}
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- OPTIMIZATION 1: Native Pip Caching ---
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 
        cache: 'pip' # Automatically caches pip downloads based on requirements.txt

    # --- OPTIMIZATION 2: PyInstaller AST Caching ---
    - name: Cache PyInstaller workspace
      uses: actions/cache@v4
      with:
        path: build/
        # Cache breaks and resets if you change the spec file or dependencies
        key: ${{ runner.os }}-pyinstaller-${{ hashFiles('BioPro.spec', 'requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pyinstaller-

    - name: Install Dependencies (Windows - CPU Only)
      if: runner.os == 'Windows'
      run: |
        python -m pip install --upgrade pip wheel
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        python -m pip install --upgrade pip wheel
        pip install -r requirements.txt
        pip install pyinstaller

    # --- OPTIMIZATION 3: Removed --clean flag ---
    - name: Run PyInstaller Build
      run: pyinstaller BioPro.spec

    # --- OPTIMIZATION 4: Zip Windows Output ---
    - name: Compress Windows Build
      if: runner.os == 'Windows'
      run: |
        cd dist
        # PowerShell command to zip the folder. 
        # Uploading 1 zip file is 10x faster than uploading 5,000 raw PyTorch files.
        Compress-Archive -Path BioPro\* -DestinationPath BioPro-Windows.zip
        
    - name: Compress macOS App Bundle
      if: runner.os == 'macOS'
      run: |
        cd dist
        tar -czf BioPro-macOS.tar.gz BioPro.app
        # No need to rm -rf the folders, the runner destroys the VM anyway after upload
        
    - name: Upload Finished App to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: BioPro-Executable-${{ runner.os }}
        path: |
          dist/*.tar.gz
          dist/*.zip
        if-no-files-found: warn