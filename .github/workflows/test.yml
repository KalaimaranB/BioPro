name: Test Suite

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest", "windows-latest"]
        python-version: ["3.11"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system git+https://github.com/KalaimaranB/BioPro-SDK.git
          uv pip install --system -r requirements.txt
          uv pip install --system pytest pytest-qt pytest-cov PyQt6-headless

      - name: Run Core & SDK Tests
        run: |
          python -m pytest tests/core/ tests/sdk/ tests/test_boot.py tests/test_sanity.py \
            tests/test_resources.py tests/test_sdk_events.py tests/test_sdk_docs.py \
            --tb=short -q \
            --cov=biopro --cov-report=xml --cov-report=term-missing
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ":99"

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
