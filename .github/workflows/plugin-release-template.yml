name: BioPro Plugin Release Template

on:
  workflow_call:
    secrets:
      BIOPRO_PROJECT_PRIVATE_KEY:
        required: true
        description: "The Ed25519 private key used to sign the plugin manifest. Registered as a Project Entity in the BioPro Trust System."

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Run Test Suite
        run: uv run pytest

      - name: Validate Plugin Structure
        run: uv run biopro sdk evaluate .

      - name: Setup Project Signing Key
        run: |
          mkdir -p ~/.biopro
          echo "${{ secrets.BIOPRO_PROJECT_PRIVATE_KEY }}" > ~/.biopro/dev_private_key.pem
          chmod 600 ~/.biopro/dev_private_key.pem
          # Initialize the local chain and cert using the project key
          uv run biopro sdk init-identity --project

      - name: Sign Plugin Release
        run: |
          uv run biopro sdk sign .

      - name: Package Release
        run: |
          PLUGIN_ID=$(jq -r '.id' manifest.json)
          zip -r ${PLUGIN_ID}.zip . -x "*.git*" -x "*__pycache__*" -x "*.venv*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "*.zip"
