name: Deploy Documentation Portal

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs

      - name: Deploy to GitHub Pages
        run: |
          # Automatically compiles and pushes static site assets to gh-pages branch
          mkdocs gh-deploy --force
