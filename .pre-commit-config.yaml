repos:
  - repo: local
    hooks:
      - id: ruff-linter
        name: Ruff Linter
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-formatter
        name: Ruff Formatter
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: Mypy Type Checker
        entry: uv run mypy --explicit-package-bases biopro tests
        language: system
        pass_filenames: false

      - id: pip-audit
        name: Dependency Security Audit
        entry: uv run pip-audit --ignore-vuln CVE-2025-69872
        language: system
        pass_filenames: false

      - id: pytest
        name: Pytest Test Suite
        entry: env QT_QPA_PLATFORM=offscreen uv run python -m pytest tests/core/ tests/sdk/ tests/test_boot.py tests/test_sanity.py tests/test_resources.py tests/test_sdk_events.py tests/test_sdk_docs.py --tb=short -q --cov=biopro --cov-report=term-missing
        language: system
        pass_filenames: false
