name: BioPro Standalone Plugin Release

on:
  push:
    tags:
      - "v*" # Triggers on any tag push starting with 'v' (e.g. v1.0.0)

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: "3.11"
          cache: "pip"

      - name: Install BioPro SDK & Test Suite
        run: |
          python -m pip install --upgrade pip
          pip install biopro-sdk pytest pytest-qt PyQt6-headless

      - name: Run BioPro SDK QA Evaluation
        run: |
          python -m biopro sdk evaluate .

      - name: Run Plugin Unit Tests
        run: |
          pytest

      - name: Configure Cryptographic Signing Key
        env:
          BIOPRO_PRIVATE_KEY: ${{ secrets.BIOPRO_PRIVATE_KEY }}
        run: |
          if [ -z "$BIOPRO_PRIVATE_KEY" ]; then
            echo "ERROR: BIOPRO_PRIVATE_KEY GitHub Secret is missing!"
            exit 1
          fi
          mkdir -p ~/.biopro
          echo "$BIOPRO_PRIVATE_KEY" > ~/.biopro/dev_private_key.pem
          chmod 600 ~/.biopro/dev_private_key.pem

      - name: Sign Plugin Manifest
        run: |
          python -m biopro sdk sign .

      - name: Package Plugin Archive
        run: |
          # Compress plugin files while excluding local caches, virtual environments, and git histories
          zip -r plugin.zip . -x ".git/*" ".github/*" ".venv/*" "venv/*" "__pycache__/*" "*.pyc" ".pytest_cache/*" ".vscode/*" ".idea/*"

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: plugin.zip
          draft: false
          prerelease: false
          generate_release_notes: true
